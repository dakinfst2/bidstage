<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Способ оплаты | Encore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800,700,500&f[]=satoshi@700,500,400&f[]=jet-brains-mono@400,700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark-bg: #0F0F0F; --surface: #1A1A1A; }
        body { font-family: 'Satoshi', sans-serif; background: var(--dark-bg); color: #EDEDED; margin: 0; }
        .font-cabinet { font-family: 'Cabinet Grotesk', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .glass-card { background: rgba(26,26,26,0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .payment-card:hover { transform: translateY(-2px); border-color: rgba(212,175,55,0.4); }
        .payment-card.active { border-color: var(--gold); background: rgba(212,175,55,0.05); box-shadow: 0 0 20px rgba(212,175,55,0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col">
<header class="fixed top-0 left-0 right-0 z-50 glass-card h-20 px-4 md:px-8 flex items-center justify-between border-b border-white/5">
    <div class="flex items-center gap-6 lg:gap-12">
        <a href="/" class="text-xl md:text-2xl font-bold tracking-tighter text-white flex items-center gap-2">
            <iconify-icon icon="lucide:ticket" class="text-[var(--gold)]"></iconify-icon>Encore
        </a>
        <h1 class="hidden md:block font-cabinet font-bold text-lg uppercase tracking-widest text-gray-400">Способ оплаты</h1>
    </div>
    <a href="/wallet/topup" class="flex items-center gap-3 text-sm font-bold hover:text-[var(--gold)] transition-colors">
        <iconify-icon icon="lucide:arrow-left"></iconify-icon> Назад
    </a>
</header>

<main class="flex-1 max-w-7xl mx-auto w-full px-4 md:px-8 py-12 mt-20">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-7 space-y-8">
            <section class="glass-card rounded-[32px] p-6 md:p-10 flex items-center justify-between">
                <div class="space-y-1">
                    <p class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em]">Сумма пополнения</p>
                    <h2 class="text-3xl md:text-4xl font-mono font-black"><span id="amountDisplay">0</span> <span class="text-base md:text-xl text-gray-400 font-cabinet">AMD</span></h2>
                </div>
                <a href="/wallet/topup" class="w-12 h-12 rounded-full border border-white/10 flex items-center justify-center hover:bg-white/5 transition-all">
                    <iconify-icon icon="lucide:pencil" class="text-gray-500"></iconify-icon>
                </a>
            </section>

            <section class="space-y-4">
                <h3 class="text-xs font-bold uppercase tracking-[0.2em] text-gray-500">Доступные способы</h3>
                <div class="space-y-3" id="methodsList">
                    <!-- populated by JS -->
                </div>
            </section>
        </div>

        <div class="lg:col-span-5">
            <div class="sticky top-32 glass-card rounded-[40px] p-8 space-y-6">
                <h4 class="text-lg font-cabinet font-black uppercase tracking-widest border-b border-white/5 pb-4">Детали платежа</h4>
                <div class="space-y-5">
                    <div class="flex justify-between items-center">
                        <span class="text-sm text-gray-400">Сумма</span>
                        <span class="text-sm font-bold font-mono" id="sumLine">0 AMD</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-sm text-gray-400">Комиссия</span>
                        <span class="text-sm font-bold font-mono text-red-400" id="commLine">+ 0 AMD</span>
                    </div>
                    <div class="h-px bg-white/5"></div>
                    <div class="flex justify-between items-end">
                        <p class="text-xs font-black uppercase tracking-widest text-gray-500">Итого</p>
                        <p class="text-2xl md:text-3xl font-black text-[var(--gold)] font-mono"><span id="totalLine">0</span> AMD</p>
                    </div>
                </div>
                <button id="payBtn" class="w-full h-14 md:h-16 bg-[var(--gold)] text-black rounded-2xl font-cabinet font-black uppercase tracking-[0.2em] text-sm shadow-xl hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                    Подтвердить <iconify-icon icon="lucide:arrow-right-circle" class="text-xl"></iconify-icon>
                </button>
                <div class="flex items-center gap-3 bg-white/5 p-4 rounded-2xl">
                    <iconify-icon icon="lucide:shield-check" class="text-2xl text-green-500"></iconify-icon>
                    <p class="text-[10px] text-gray-500">Средства зачисляются мгновенно после подтверждения банком.</p>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="bg-black py-10 border-t border-white/5 mt-16">
    <div class="max-w-7xl mx-auto px-8 text-center text-gray-600 text-[10px] uppercase tracking-widest font-bold">
        <p>© 2026 Encore Армения.</p>
    </div>
</footer>

<script src="{{ url_for('static', filename='security.js') }}"></script>
<script src="{{ url_for('static', filename='toast.js') }}"></script>
<script>
    const amount = parseInt(sessionStorage.getItem('topup_amount') || '0');
    const nextUrlForTopup = window.safeNextUrl(sessionStorage.getItem('topup_next') || '');
    
    if (amount <= 0) {
        window.location.href = '/wallet/topup';
    }
    
    const methods = {
        visa: { name: 'Visa / MasterCard', commission: '1% + 100 AMD', rate: 0.01, flat: 100, icon: 'logos:visa', color: 'text-white' },
        applepay: { name: 'Apple Pay', commission: '0.5%', rate: 0.005, flat: 0, icon: 'logos:apple-pay', color: 'text-white' },
        googlepay: { name: 'Google Pay', commission: '0.5%', rate: 0.005, flat: 0, icon: 'logos:google-pay', color: 'text-white' },
        idbank: { name: 'ID Bank', commission: 'Без комиссии', rate: 0, flat: 0, icon: 'lucide:landmark', color: 'text-blue-400' },
        ameria: { name: 'Ameriabank', commission: 'Без комиссии', rate: 0, flat: 0, icon: 'lucide:building-2', color: 'text-[var(--gold)]' }
    };
    
    let selected = 'idbank';
    
    function calc(id) {
        const m = methods[id];
        return Math.round(amount * m.rate + m.flat);
    }
    
    function render() {
        document.getElementById('amountDisplay').textContent = amount.toLocaleString();
        document.getElementById('sumLine').textContent = amount.toLocaleString() + ' AMD';
        document.getElementById('commLine').textContent = '+ ' + calc(selected).toLocaleString() + ' AMD';
        document.getElementById('totalLine').textContent = (amount + calc(selected)).toLocaleString();
        
        const list = document.getElementById('methodsList');
        list.innerHTML = Object.entries(methods).map(([id, m]) => `
            <label class="payment-card glass-card flex items-center gap-4 p-5 rounded-2xl cursor-pointer transition-all ${selected === id ? 'active' : ''}" data-id="${id}">
                <div class="w-16 h-12 bg-white/5 rounded-xl flex items-center justify-center flex-shrink-0">
                    <iconify-icon icon="${m.icon}" class="text-2xl ${m.color}"></iconify-icon>
                </div>
                <div class="flex-1">
                    <p class="font-bold text-white">${m.name}</p>
                    <p class="text-xs ${m.rate === 0 ? 'text-green-500' : 'text-gray-500'} uppercase font-bold mt-1 tracking-tight">${m.commission}</p>
                </div>
                <div class="w-6 h-6 rounded-full border-2 ${selected === id ? 'border-[var(--gold)]' : 'border-white/20'} flex items-center justify-center flex-shrink-0">
                    ${selected === id ? '<div class="w-3 h-3 rounded-full bg-[var(--gold)]"></div>' : ''}
                </div>
            </label>
        `).join('');
        
        document.querySelectorAll('.payment-card').forEach(card => {
            card.addEventListener('click', () => {
                selected = card.dataset.id;
                render();
            });
        });
    }
    
    document.getElementById('payBtn').addEventListener('click', async () => {
        const btn = document.getElementById('payBtn');
        btn.disabled = true;
        btn.textContent = 'ОБРАБОТКА...';
        
        try {
            const r = await fetch('/api/wallet/topup', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    amount: amount + calc(selected),
                    method: selected,
                    next: nextUrlForTopup || ''
                })
            });
            const data = await r.json();

            if (r.ok) {
                sessionStorage.setItem('last_tx_amount', amount + calc(selected));
                sessionStorage.setItem('last_tx_method', methods[selected].name);
                sessionStorage.removeItem('topup_amount');
                // Сервер уже провалидировал next; кладём ровно то, что он вернул.
                const serverNext = window.safeNextUrl(data.next_url || '');
                if (serverNext) {
                    sessionStorage.setItem('topup_next', serverNext);
                } else {
                    sessionStorage.removeItem('topup_next');
                }
                window.location.href = '/wallet/success';
            } else {
                showToast(data.error || 'Ошибка платежа');
                btn.disabled = false;
                btn.innerHTML = 'Подтвердить <iconify-icon icon="lucide:arrow-right-circle" class="text-xl"></iconify-icon>';
            }
        } catch (e) {
            showToast('Ошибка соединения');
            btn.disabled = false;
            btn.innerHTML = 'Подтвердить <iconify-icon icon="lucide:arrow-right-circle" class="text-xl"></iconify-icon>';
        }
    });
    
    render();
</script>
</body>
</html>
